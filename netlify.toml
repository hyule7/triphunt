[build]
  publish   = "TripHunt_v8_final"
  functions = "TripHunt_v8_final/netlify/functions"
  command   = ""

[functions]
  node_bundler = "zisi"

[functions.checkPriceAlerts]
  schedule = "0 7 * * *"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
